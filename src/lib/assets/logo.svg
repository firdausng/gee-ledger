<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="#2563eb"/>

  <!-- Berry symbol: bold "B" with double strike-through -->

  <!-- Vertical stem of B -->
  <rect x="168" y="112" width="32" height="288" rx="4" fill="white"/>

  <!-- Top bump of B -->
  <path d="M184,112 h40 a72,72 0 0,1 0,144 h-40" stroke="white" stroke-width="32" fill="none" stroke-linejoin="round"/>

  <!-- Bottom bump of B (slightly wider) -->
  <path d="M184,256 h52 a72,72 0 0,1 0,144 h-52" stroke="white" stroke-width="32" fill="none" stroke-linejoin="round"/>

  <!-- Double horizontal strike-through -->
  <rect x="128" y="228" width="240" height="20" rx="10" fill="white"/>
  <rect x="128" y="280" width="240" height="20" rx="10" fill="white"/>
</svg>
